# ============================================================
# 【Redisson配置】
#
# 【配置说明】
# 1. Redisson是一个高级的分布式协调工具库
# 2. 提供分布式锁、分布式集合、分布式服务等功能
# 3. 支持Redis集群、哨兵、主从等模式
# ============================================================

redisson:
  # 单节点配置
  single-server-config:
    address: redis://${spring.data.redis.host}:${spring.data.redis.port}
    password: ${spring.data.redis.password:}
    database: ${spring.data.redis.database:0}
    # 连接池大小
    connection-pool-size: 20
    # 最小空闲连接数
    connection-minimum-idle-size: 5
    # 连接超时
    connect-timeout: 10000
    # 命令超时
    timeout: 10000
    # 发布订阅连接池大小
    subscription-connection-pool-size: 50

  # 线程池配置
  threads: 16
  netty-threads: 32

  # 锁配置
  lock:
    # Watch Dog续期时间（秒）
    watchdog-timeout: 30
    # Watch Dog检查间隔（秒）
    watchdog-check-interval: 10
